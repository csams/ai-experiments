db:
  driver: postgres
  postgres:
    host: todo-postgres
    port: 5432
    dbname: todo
    user: todo
    password: ""  # set via TODO_DB_POSTGRES_PASSWORD env var or mounted secret
    sslmode: verify-ca
    sslrootcert: /etc/todo/certs/ca.crt

vector:
  enabled: true
  embedder: ollama
  store: pgvector
  ollama:
    model: nomic-embed-text
    url: http://host.containers.internal:11434  # host.containers.internal resolves to the host from within podman containers
  # Background reconciler — re-embeds entities whose last sync attempt
  # failed (vector_dirty flag set on the row). Only runs under `todo mcp`.
  reconcile_interval: 30s
  reconcile_batch_size: 100

logging:
  level: info
  format: json
  output: stderr
  audit: true
  # Per-string-value cap for Change.old/new in audit records. 256 is
  # plenty for state transitions and short edits; long description /
  # checkpoint diffs get truncated with an elision marker showing how
  # many runes were dropped. Set audit_full_values: true to disable
  # truncation entirely.
  audit_value_cap: 256
  audit_full_values: false

mcp:
  transport: http
  addr: ":8080"
  # Single-tenant form: one key. The audit log attributes every action
  # to actor="default". Inject via TODO_MCP_API_KEY env var; do NOT put
  # the key here. Must be at least 20 characters when set.
  api_key: ""
  # Multi-tenant form: label → key. Each label appears as the audit log
  # `actor` field for requests authenticated with the matching key.
  # Mutually exclusive with api_key. Env-var configuration is awkward
  # for maps; use a config file for multi-tenant deployments. Generate
  # keys with `todo mcp gen-key`.
  # api_keys:
  #   alice: "<long-random-string>"
  #   bob:   "<long-random-string>"
  tls_cert: /etc/todo/certs/mcp/server.crt
  tls_key: /etc/todo/certs/mcp/server.key
  # HTTP transport hardening. Defaults applied when omitted.
  max_body_bytes: 8388608   # 8 MiB request body cap; 0 disables
  read_timeout: 30s         # full request read (headers + body); 0 disables
  write_timeout: 0s         # 0 leaves SSE streams uncapped; set only if you know you don't need streaming
