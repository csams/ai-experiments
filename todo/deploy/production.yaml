db:
  driver: postgres
  postgres:
    host: todo-postgres
    port: 5432
    dbname: todo
    user: todo
    password: ""  # set via TODO_DB_POSTGRES_PASSWORD env var or mounted secret
    sslmode: verify-ca
    sslrootcert: /etc/todo/certs/ca.crt

vector:
  enabled: true
  embedder: ollama
  store: pgvector
  ollama:
    model: nomic-embed-text
    url: http://host.containers.internal:11434  # host.containers.internal resolves to the host from within podman containers

logging:
  level: info
  format: json
  output: stderr
  audit: true

mcp:
  transport: http
  addr: ":8080"
  api_key: ""    # injected via TODO_MCP_API_KEY env var; do NOT put keys here
  tls_cert: /etc/todo/certs/mcp/server.crt
  tls_key: /etc/todo/certs/mcp/server.key
