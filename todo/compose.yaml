services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    volumes:
      - chromadata:/chroma/chroma
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5

  todo-mcp:
    build:
      context: .
      dockerfile: Containerfile
    command: ["mcp", "--transport", "http", "--addr", ":8080"]
    environment:
      - TODO_CONFIG=/etc/todo/config.yaml
      - PGPASSWORD_FILE=/run/secrets/pg_password
    configs:
      - source: todo_config
        target: /etc/todo/config.yaml
    secrets:
      - pg_password
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy

volumes:
  pgdata:
  chromadata:

configs:
  todo_config:
    file: ./deploy/production.yaml

secrets:
  pg_password:
    file: ./secrets/pg_password
