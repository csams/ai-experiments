services:
  postgres:
    image: docker.io/pgvector/pgvector:pg16
    entrypoint: ["/usr/local/bin/pg-start-ssl.sh"]
    command: ["postgres"]
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ${CERT_DIR:?Set CERT_DIR in .env}/postgres:/etc/ssl/todo:ro
      - ./scripts/pg-start-ssl.sh:/usr/local/bin/pg-start-ssl.sh:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  todo-mcp:
    build:
      context: .
      dockerfile: Containerfile
    user: "0"  # Root required to read TLS key files (mounted root:root 0600 from host)
    command: ["mcp", "--config", "/etc/todo/config.yaml", "--transport", "http", "--addr", ":8080"]
    environment:
      - TODO_DB_POSTGRES_HOST=postgres
      - TODO_DB_POSTGRES_PASSWORD=${PG_PASSWORD}
      - TODO_MCP_API_KEY=${MCP_API_KEY:-}
    configs:
      - source: todo_config
        target: /etc/todo/config.yaml
    volumes:
      - ${CERT_DIR:?Set CERT_DIR in .env}/ca.crt:/etc/todo/certs/ca.crt:ro
      - ${CERT_DIR:?Set CERT_DIR in .env}/mcp:/etc/todo/certs/mcp:ro
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:

configs:
  todo_config:
    file: ./deploy/production.yaml

