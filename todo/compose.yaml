services:
  postgres:
    image: docker.io/library/postgres:16.13
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: ghcr.io/chroma-core/chroma:1.5.7
    environment:
      CHROMA_SERVER_AUTHN_PROVIDER: chromadb.auth.token_authn.TokenAuthenticationServerProvider
      CHROMA_SERVER_AUTHN_CREDENTIALS: ${CHROMA_TOKEN}
    volumes:
      - chromadata:/chroma/chroma
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Authorization: Bearer ${CHROMA_SERVER_AUTHN_CREDENTIALS}", "http://localhost:8000/api/v2/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 5

  todo-mcp:
    build:
      context: .
      dockerfile: Containerfile
    command: ["mcp", "--config", "/etc/todo/config.yaml", "--transport", "http", "--addr", ":8080"]
    environment:
      - TODO_DB_POSTGRES_HOST=postgres
      - TODO_DB_POSTGRES_PASSWORD=${PG_PASSWORD}
      - TODO_VECTOR_CHROMADB_URL=http://chromadb:8000
      - TODO_VECTOR_CHROMADB_AUTH_TOKEN=${CHROMA_TOKEN}
      - TODO_MCP_API_KEY=${MCP_API_KEY:-}
      - TODO_MCP_TLS_CERT=${MCP_TLS_CERT:-}
      - TODO_MCP_TLS_KEY=${MCP_TLS_KEY:-}
    configs:
      - source: todo_config
        target: /etc/todo/config.yaml
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy

volumes:
  pgdata:
  chromadata:

configs:
  todo_config:
    file: ./deploy/production.yaml

